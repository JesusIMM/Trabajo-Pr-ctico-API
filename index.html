<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasa Api</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Nasa API</h1>
        </header>

        <section class="panel">
            <div class="controls">
                <div class="group">
                    <label for="fecha">Buscar por fecha</label>
                    <input type="date" id="fecha">
                    <button id="btnFecha">Buscar fecha</button>
                </div>

                <div class="group">
                    <label for="fechaInicio">Buscar por rango</label>
                    <input type="date" id="fechaInicio">
                    <input type="date" id="fechaFin">
                    <button id="btnRango">Buscar rango</button>
                </div>

                <div class="group">
                    <label for="cantidad">Fotos aleatorias</label>
                    <input type="number" id="cantidad" min="1" max="10" value="3">
                    <button id="btnAleatorias">Mostrar aleatorias</button>
                </div>

                <div class="group">
                    <label>Foto del día</label>
                    <button id="btnHoy">Ver foto del día</button>
                </div>
            </div>

            <div id="mensaje" class="message"></div>
        </section>

        <main id="resultado" class="results"></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
